<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fast File Tools - PDF Converter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Fast File Tools</h1>
    <p>Simple PDF Converter</p>
  </header>

  <div class="container">

    <!-- LEFT AD -->
    <aside class="ad ad-left">
      <p>Ad Space</p>
    </aside>

    <!-- MAIN CONTENT -->
    <main>
      <h2>Convert Files to PDF</h2>

      <form id="uploadForm">
        <input type="file" id="fileInput" required />
        <button type="submit">Convert to PDF</button>
      </form>

      <div id="status"></div>
    </main>

    <!-- RIGHT AD -->
    <aside class="ad ad-right">
      <p>Ad Space</p>
    </aside>

  </div>

  <!-- BOTTOM AD -->
  <footer class="ad ad-bottom">
    <p>Ad Space</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
